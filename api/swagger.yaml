openapi: 3.0.0
info:
  title: API Artículo 140 - Sistema VOAE
  version: 1.0.0
  description: API REST para la gestión del Sistema de Gestión de Horas VOAE (Vinculación con la Sociedad) de la UNAH
  contact:
    name: MelvinMajano
    url: https://github.com/MelvinMajano/api-articulo140
  license:
    name: ISC

servers:
  - url: http://localhost:4000
    description: Servidor de desarrollo

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT para autenticación
      
  schemas:

    Post:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        title:
          type: string
          example: "Convocatoria VOAE — Actividad Cultural"
        content:
          type: string
          example: "Se invita a todos los estudiantes a participar..."
        image_url:
          type: string
          nullable: true
          example: "https://res.cloudinary.com/demo/image/upload/v1/sample.jpg"
        category:
          type: string
          enum: [General, VOAE, Academico, Convocatoria]
          example: "Convocatoria"
        is_pinned:
          type: integer
          enum: [0, 1]
          description: 1 = fijado, 0 = no fijado
          example: 0
        is_visible:
          type: integer
          enum: [0, 1]
          description: 1 = visible, 0 = oculto
          example: 1
        event_date:
          type: string
          format: date-time
          nullable: true
          example: "2025-11-15T14:00:00.000Z"
        event_place:
          type: string
          nullable: true
          example: "Auditorio Central, Edificio F3"
        view_count:
          type: integer
          description: Total de vistas únicas del post (COUNT de about_post_views)
          example: 47
        created_at:
          type: string
          format: date-time
          example: "2025-10-01T10:30:00.000Z"
 
    PostBody:
      type: object
      required:
        - title
        - content
        - category
      properties:
        title:
          type: string
          minLength: 1
          example: "Convocatoria VOAE — Actividad Cultural"
        content:
          type: string
          minLength: 1
          example: "Se invita a todos los estudiantes a participar en la actividad cultural."
        image_url:
          type: string
          nullable: true
          description: URL de imagen en Cloudinary (opcional)
          example: "https://res.cloudinary.com/demo/image/upload/v1/sample.jpg"
        category:
          type: string
          enum: [General, VOAE, Academico, Convocatoria]
          example: "Convocatoria"
        is_pinned:
          type: boolean
          default: false
          example: false
        is_visible:
          type: boolean
          default: true
          example: true
        event_date:
          type: string
          format: date-time
          nullable: true
          description: Fecha y hora del evento en formato ISO 8601 (opcional)
          example: "2025-11-15T14:00:00.000Z"
        event_place:
          type: string
          nullable: true
          description: Lugar del evento (opcional)
          example: "Auditorio Central, Edificio F3"

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único del usuario
        name:
          type: string
          description: Nombre completo del usuario
        email:
          type: string
          format: email
          description: Correo electrónico del usuario
        accountNumber:
          type: integer
          description: Número de cuenta del estudiante
        identityNumber:
          type: string
          description: Número de identidad
        role:
          type: string
          enum: [admin, student, supervisor]
          description: Rol del usuario
        degreeId:
          type: integer
          description: ID de la carrera asociada
        isDeleted:
          type: string
          enum: [true, false]
          description: Estado de eliminación
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          
    Activity:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único de la actividad
        title:
          type: string
          description: Título de la actividad
        description:
          type: string
          description: Descripción de la actividad
        degreeId:
          type: integer
          description: ID de la carrera asociada
        startDate:
          type: string
          format: date-time
          description: Fecha y hora de inicio
        endDate:
          type: string
          format: date-time
          description: Fecha y hora de finalización
        voaeHours:
          type: integer
          description: Horas VOAE que otorga la actividad
        availableSpots:
          type: integer
          description: Cupos disponibles
        supervisorId:
          type: string
          format: uuid
          description: ID del supervisor
        status:
          type: string
          enum: [pending, inProgress, finished, 'submittedToSudecad', 'approvedBySudecad','external']
          description: Estado de la actividad
        isDisabled:
          type: string
          enum: [true, false]
          description: Estado de habilitación
        isDeleted:
          type: string
          enum: [true, false]
          description: Estado de eliminación
        access:
          type: string
          enum: [all, restricted]
          description: Tipo de acceso
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          
    Degree:
      type: object
      properties:
        id:
          type: integer
          description: ID único de la carrera
        code:
          type: string
          description: Código de la carrera
        name:
          type: string
          description: Nombre de la carrera
        faculty:
          type: string
          description: Facultad a la que pertenece
        isDisabled:
          type: string
          enum: [true, false]
          description: Estado de habilitación
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          
    Attendance:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único de la asistencia
        studentId:
          type: string
          format: uuid
          description: ID del estudiante
        activityId:
          type: string
          format: uuid
          description: ID de la actividad
        entryTime:
          type: string
          format: date-time
          description: Hora de entrada
        exitTime:
          type: string
          format: date-time
          description: Hora de salida
        observations:
          type: string
          description: Observaciones
        hoursAwarded:
          type: integer
          description: Horas otorgadas
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          
    Registration:
      type: object
      properties:
        studentId:
          type: string
          format: uuid
          description: ID del estudiante
        activityId:
          type: string
          format: uuid
          description: ID de la actividad
        registrationDate:
          type: string
          format: date-time
          description: Fecha de inscripción
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          
    File:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único del archivo
        activityId:
          type: string
          format: uuid
          description: ID de la actividad asociada
        fileName:
          type: string
          description: Nombre del archivo
        url:
          type: string
          description: URL del archivo
        fileType:
          type: string
          description: Tipo de archivo
        fileSize:
          type: integer
          description: Tamaño del archivo en bytes
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          
    Error:
      type: object
      properties:
        message:
          type: string
          description: Mensaje de error
        error:
          type: string
          description: Detalles del error
        status:
          type: integer
          description: Código de estado HTTP
          
    Success:
      type: object
      properties:
        message:
          type: string
          description: Mensaje de éxito
        data:
          type: object
          description: Datos de respuesta

security:
  - bearerAuth: []

paths:

  # AboutPage ENDPOINTS
  /api/about/sections:
    get:
      tags:
        - About - Secciones
      summary: Obtener estado de visibilidad de secciones
      description: >
        Retorna el estado actual (visible/oculto) de las cuatro secciones
        configurables de la página About. Acceso público.
      responses:
        '200':
          description: Estado de secciones obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "El estado de las secciones son:"
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        carousel:
                          type: integer
                          enum: [0, 1]
                          description: Visibilidad del carrusel/galería (1=visible, 0=oculto)
                          example: 1
                        mision_vision:
                          type: integer
                          enum: [0, 1]
                          description: Visibilidad de la sección Misión y Visión
                          example: 1
                        competencies:
                          type: integer
                          enum: [0, 1]
                          description: Visibilidad de la sección Áreas de Competencia
                          example: 1
                        goals:
                          type: integer
                          enum: [0, 1]
                          description: Visibilidad de la sección Objetivos de la Carrera
                          example: 1
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
 
    put:
      tags:
        - About - Secciones
      summary: Actualizar visibilidad de secciones
      description: >
        Actualiza el estado de visibilidad de las cuatro secciones de la página About.
        Todos los campos son requeridos. **Solo administradores.**
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - carousel
                - mision_vision
                - competencies
                - goals
              properties:
                carousel:
                  type: integer
                  enum: [0, 1]
                  description: Habilitar (1) o deshabilitar (0) el carrusel
                  example: 1
                mision_vision:
                  type: integer
                  enum: [0, 1]
                  description: Habilitar (1) o deshabilitar (0) Misión y Visión
                  example: 1
                competencies:
                  type: integer
                  enum: [0, 1]
                  description: Habilitar (1) o deshabilitar (0) Áreas de Competencia
                  example: 0
                goals:
                  type: integer
                  enum: [0, 1]
                  description: Habilitar (1) o deshabilitar (0) Objetivos de la Carrera
                  example: 1
            example:
              carousel: 1
              mision_vision: 1
              competencies: 0
              goals: 1
      responses:
        '200':
          description: Secciones actualizadas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Secciones actualizadas con éxito"
        '400':
          description: Faltan campos requeridos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Todos los campos son requeridos"
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Acceso denegado — Solo administradores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
 
  # ─── POSTS ────────────────────────────────────────────────────────────────────
 
  /api/about/posts:
    get:
      tags:
        - About - Posts
      summary: Obtener posts visibles
      description: >
        Retorna todas las publicaciones visibles del tablón de noticias.
        Opcionalmente filtra por categoría. Acceso público.
        Los posts se ordenan por `is_pinned DESC, created_at DESC`.
      parameters:
        - in: query
          name: category
          required: false
          schema:
            type: string
            enum: [General, VOAE, Academico, Convocatoria]
          description: Filtrar publicaciones por categoría
          example: VOAE
      responses:
        '200':
          description: Posts obtenidos exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Los posts son:"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Post'
        '400':
          description: Categoría inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "La categoría debe ser una de las siguientes: General, VOAE, Academico, Convocatoria"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
 
    post:
      tags:
        - About - Posts
      summary: Crear nueva publicación
      description: >
        Crea una nueva publicación en el tablón de noticias.
        **Solo administradores.**
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostBody'
            example:
              title: "Convocatoria VOAE — Actividad Cultural"
              content: "Se invita a todos los estudiantes a participar en la actividad cultural del próximo viernes."
              category: "Convocatoria"
              is_pinned: false
              is_visible: true
              image_url: "https://res.cloudinary.com/demo/image/upload/v1/sample.jpg"
              event_date: "2025-11-15T14:00:00.000Z"
              event_place: "Auditorio Central, Edificio F3"
      responses:
        '201':
          description: Post creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Post creado con éxito"
        '400':
          description: Datos inválidos o campos requeridos faltantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Los campos title, content y category son requeridos"
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Acceso denegado — Solo administradores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
 
  /api/about/posts/admin:
    get:
      tags:
        - About - Posts
      summary: Obtener todos los posts (admin)
      description: >
        Retorna todas las publicaciones incluyendo las ocultas (`is_visible = 0`).
        **Solo administradores.**
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Posts obtenidos exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Los posts son:"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Post'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Acceso denegado — Solo administradores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
 
  /api/about/posts/{id}:
    put:
      tags:
        - About - Posts
      summary: Actualizar publicación
      description: >
        Actualiza todos los campos de una publicación existente.
        **Solo administradores.**
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID del post a actualizar
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostBody'
      responses:
        '200':
          description: Post actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Post actualizado con éxito"
        '400':
          description: Datos inválidos o campos requeridos faltantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Acceso denegado — Solo administradores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Post no encontrado"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
 
    delete:
      tags:
        - About - Posts
      summary: Eliminar publicación
      description: >
        Elimina permanentemente una publicación del tablón de noticias.
        **Solo administradores.**
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID del post a eliminar
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        '200':
          description: Post eliminado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Post eliminado con éxito"
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Acceso denegado — Solo administradores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Post no encontrado"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
 
  /api/about/posts/{id}/visibility:
    patch:
      tags:
        - About - Posts
      summary: Alternar visibilidad de publicación
      description: >
        Cambia el estado de visibilidad de una publicación entre visible e invisible.
        Si `is_visible = 1` lo cambia a `0`, y viceversa.
        **Solo administradores.**
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID del post
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        '200':
          description: Visibilidad actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Visibilidad del post actualizada con éxito"
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Acceso denegado — Solo administradores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Post no encontrado"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
 
  /api/about/posts/{id}/pin:
    patch:
      tags:
        - About - Posts
      summary: Alternar estado de fijado de publicación
      description: >
        Cambia el estado de pin de una publicación.
        Si `is_pinned = 1` lo cambia a `0`, y viceversa.
        Las publicaciones fijadas aparecen al inicio del tablón.
        **Solo administradores.**
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUID del post
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        '200':
          description: Estado de pin actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Estado de pin del post actualizado con éxito"
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Acceso denegado — Solo administradores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Post no encontrado"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
 
  /api/about/posts/{postid}/view:
    post:
      tags:
        - About - Posts
      summary: Registrar vista de publicación
      description: >
        Incrementa el contador de vistas de una publicación para un viewer específico.
        Usa `INSERT IGNORE` con `UNIQUE KEY (post_id, viewer_key)` para que cada
        viewer solo cuente una vez por post. Acceso público.
      parameters:
        - in: path
          name: postid
          required: true
          schema:
            type: string
            format: uuid
          description: UUID del post
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - viewer_key
              properties:
                viewer_key:
                  type: string
                  format: uuid
                  description: >
                    Identificador único del viewer. Si el usuario está autenticado,
                    usar su user_id. Si es anónimo, usar un UUID generado y
                    almacenado en localStorage bajo la clave `viewer_key`.
                  example: "f7e8d9c0-b1a2-4321-8765-fedcba987654"
            example:
              viewer_key: "f7e8d9c0-b1a2-4321-8765-fedcba987654"
      responses:
        '200':
          description: Vista registrada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Visitas del post incrementadas con éxito"
        '400':
          description: viewer_key no proporcionado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "viewer_key es requerido"
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Post no encontrado"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # AUTH ENDPOINTS
  /api/auth/register:
    post:
      tags:
        - Autenticación
      summary: Registrar nuevo usuario
      description: Crear una nueva cuenta de usuario en el sistema
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
