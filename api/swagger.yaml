  # ATTENDANCE ENDPOINTS
  /api/activities/attendance:
    post:
      tags:
        - Asistencias
      summary: Registrar asistencia
      description: Registrar la asistencia de un estudiante a una actividad
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - studentId
                - activityId
                - entryTime
              properties:
                studentId:
                  type: string
                  format: uuid
                  example: "123e4567-e89b-12d3-a456-426614174000"
                activityId:
                  type: string
                  format: uuid
                  example: "987fcdeb-51a2-43d1-9f4c-123456789abc"
                entryTime:
                  type: string
                  format: date-time
                  example: "2025-11-01T08:00:00Z"
                exitTime:
                  type: string
                  format: date-time
                  example: "2025-11-01T12:00:00Z"
                observations:
                  type: string
                  example: "Participación completa en el taller"
      responses:
        '201':
          description: Asistencia registrada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          description: Error al registrar asistencia
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Acceso denegado - Solo supervisores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
                
  /api/activities/attendance/{activityid}:
    get:
      tags:
        - Asistencias
      summary: Obtener asistencias de una actividad
      description: Listar todas las asistencias registradas para una actividad específica
      parameters:
        - name: activityid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la actividad
      responses:
        '200':
          description: Lista de asistencias de la actividad
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  attendances:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Attendance'
                        - type: object
                          properties:
                            student:
                              $ref: '#/components/schemas/User'
        '403':
          description: Acceso denegado - Solo administradores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
